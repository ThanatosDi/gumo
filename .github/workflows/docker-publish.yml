name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: thanatosdi/gumo

jobs:
  # ---------------------------------------------------------------
  # 在原生架構的 runner 上各自建置，以 digest 形式推到 registry
  # （不打 tag，merge job 才會打 tag）
  # ---------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            slug: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker metadata (labels only)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.slug }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------
  # 透過自訂 composite action 合併兩個 digest 成 manifest list 並打 tag
  # https://github.com/ThanatosDi/merge-images-digests
  # ---------------------------------------------------------------
  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # merge-images-digests action 預期的 tags 是「純 tag 名稱」（latest / main / v1.0.0），
      # 不是 metadata-action 預設輸出的 image:tag 完整格式，
      # 所以從 outputs.json 解析 tag-names。
      - name: Extract tag names
        id: tagnames
        env:
          META_JSON: ${{ steps.meta.outputs.json }}
        run: |
          {
            echo 'names<<EOF'
            jq -r '."tag-names"[]' <<<"$META_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Merge digests and push manifest
        uses: ThanatosDi/merge-images-digests@main
        with:
          image-name: ${{ env.IMAGE_NAME }}
          artifact-pattern: digest-*
          tags: ${{ steps.tagnames.outputs.names }}
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
